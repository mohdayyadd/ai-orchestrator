services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@postgres:5432/orchestrator
      REDIS_URL: redis://redis:6379/0
      RUNNING_IN_DOCKER: "1"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./.agent_runs:/workspace/.agent_runs
      - ./workspace/repos:/workspace/repos
      - ./workspace/tasks:/workspace/tasks
      - ./workspace/ecc:/workspace/ecc
      - ./workspace/obsidian-vault:/workspace/obsidian-vault
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uvicorn agent_orchestrator.api.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
